<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Stride with Mide</title>
    <style>
        :root { --gold: #D4AF37; --bg: #FFFFFF; --text: #1a1a1a; --card-bg: #f9f9f9; --border: #ddd; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        nav { padding: 20px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav a { text-decoration: none; color: var(--text); font-weight: bold; }
        
        .shop-container { display: flex; padding: 20px; gap: 20px; }
        .sidebar { width: 200px; flex-shrink: 0; padding-top: 20px; }
        .sidebar li { margin-bottom: 15px; cursor: pointer; color: var(--gold); font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; width: 100%; }
        .card { border: 1px solid var(--border); padding: 15px; border-radius: 12px; background: var(--card-bg); }
        .btn-gold { background: var(--gold); color: white; padding: 12px; border: none; width: 100%; cursor: pointer; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <h2 style="color: var(--gold); margin:0;">STRIDE WITH MIDE</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
        </ul>
    </nav>

    <div class="shop-container">
        <aside class="sidebar">
            <h3>Filter</h3>
            <ul onclick="filterProducts(event)">
                <li data-val="all">All</li>
                <li data-val="Men">Men</li>
                <li data-val="Women">Women</li>
            </ul>
        </aside>

        <div id="catalog-grid" class="grid">Loading products...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>
    <script>
        const client = contentful.createClient({
            space: 'ntzxqqxda5ma',
            accessToken: 'AZZvP-qm49eg6mByKlG6hnFu7mhYI5XsyauAb1J9b-E' 
        });

        let allProducts = [];

        async function loadShop() {
            try {
                const res = await client.getEntries({ content_type: 'strideWithMideProduct' });
                allProducts = res.items;
                render(allProducts);
            } catch (err) {
                document.getElementById('catalog-grid').innerHTML = "Error loading products.";
            }
        }

        function render(items) {
            document.getElementById('catalog-grid').innerHTML = items.map(p => `
                <div class="card">
                    <img src="${p.fields.gallery[0].fields.file.url}" style="width:100%; height:200px; object-fit:cover; border-radius:8px;">
                    <h3>${p.fields.productName}</h3>
                    <p>Category: ${p.fields.gender || 'General'}</p>
                    <button class="btn-gold" onclick="window.open('https://wa.me/2348066948611?text=I want to order ${p.fields.productName}')">
                        Order on WhatsApp 💬
                    </button>
                </div>
            `).join('');
        }

        function filterProducts(e) {
            const val = e.target.getAttribute('data-val');
            if (!val) return;
            if (val === 'all') return render(allProducts);
            const filtered = allProducts.filter(p => p.fields.gender === val);
            render(filtered);
        }

        loadShop();
    </script>
</body>
</html>
