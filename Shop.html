<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Stride with Mide</title>
    <style>
        :root { --gold: #D4AF37; --bg: #FFFFFF; --text: #1a1a1a; --card-bg: #f9f9f9; --border: #ddd; }
        body.dark-mode { --bg: #1a1a1a; --text: #FFFFFF; --card-bg: #222222; --border: #333; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        
        nav { padding: 20px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .controls { text-align: center; padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: center; gap: 20px; }
        
        .shop-container { display: flex; padding: 20px; gap: 20px; }
        .sidebar { min-width: 200px; }
        .sidebar li { margin-bottom: 10px; cursor: pointer; color: var(--gold); font-weight: bold; list-style: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; width: 100%; }
        .card { border: 1px solid var(--border); padding: 15px; border-radius: 12px; background: var(--card-bg); }
        .btn-gold { background: var(--gold); color: white; padding: 12px; text-decoration: none; border-radius: 5px; display: block; text-align: center; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <h2 style="color: var(--gold); margin:0;">STRIDE WITH MIDE</h2>
        <a href="shop.html" style="color:var(--text); text-decoration:none; font-weight:bold;">Reset Filters</a>
    </nav>

    <div class="controls">
        <button onclick="toggleTheme()">Toggle Dark Mode 🌗</button>
        <select id="currency-select" onchange="loadShop()">
            <option value="NGN">Naira (₦)</option>
            <option value="USD">USD ($)</option>
        </select>
    </div>

    <div class="shop-container">
        <aside class="sidebar">
            <h3>Categories</h3>
            <ul onclick="filter(event)">
                <li data-val="Men" data-type="category">Men</li>
                <li data-val="Women" data-type="category">Women</li>
                <hr>
                <h3>Subcategories</h3>
                <li data-val="Sandal" data-type="subCategory">Sandals</li>
                <li data-val="Slide" data-type="subCategory">Slides</li>
                <li data-val="Shoe" data-type="subCategory">Shoes</li>
                <li data-val="Sneaker" data-type="subCategory">Sneakers</li>
            </ul>
        </aside>
        <div id="catalog-grid" class="grid">Loading products...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>
    <script>
        // Theme logic
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
        function toggleTheme() { 
            document.body.classList.toggle('dark-mode'); 
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode')); 
        }

        const client = contentful.createClient({ space: 'ntzxqqxda5ma', accessToken: 'AZZvP-qm49eg6mByKlG6hnFu7mhYI5XsyauAb1J9b-E' });

        async function loadShop() {
            const urlParams = new URLSearchParams(window.location.search);
            const cat = urlParams.get('category');
            const sub = urlParams.get('subCategory');
            
            let query = { content_type: 'strideWithMideProduct' };
            if(cat) query['fields.category'] = cat;
            if(sub) query['fields.subCategory'] = sub;

            // Currency conversion
            const res = await client.getEntries(query);
            const rateRes = await fetch('https://v6.exchangerate-api.com/v6/675df7a7e10575ccaa18b307/latest/NGN');
            const rateData = await rateRes.json();
            const rate = rateData.conversion_rates.USD;
            const currency = document.getElementById('currency-select').value;

            document.getElementById('catalog-grid').innerHTML = res.items.map(p => `
                <div class="card">
                    <img src="${p.fields.gallery ? p.fields.gallery[0].fields.file.url : ''}" style="width:100%; height:200px; object-fit:cover; border-radius:8px;">
                    <h3>${p.fields.productName}</h3>
                    <p>Type: ${p.fields.subCategory || 'Footwear'}</p>
                    <p>Price: ${currency === 'NGN' ? '₦'+p.fields.price.toLocaleString() : '$'+(p.fields.price * rate).toFixed(2)}</p>
                    <a href="details.html?id=${p.sys.id}" class="btn-gold">View Details</a>
                </div>
            `).join('');
        }

        function filter(e) {
            const val = e.target.getAttribute('data-val');
            const type = e.target.getAttribute('data-type');
            if(val && type) window.location.href = `shop.html?${type}=${val}`;
        }
        
        loadShop();
    </script>
</body>
</html>
